[platformio]
default_envs = esp32-2432S028R

[env]
platform = espressif32
framework = arduino
; Both pinned as a known-good pair: registry 3.0.0 is an unreleased snapshot that
; breaks against every current LVGL; 2.1.1 (latest GitHub release) targets 9.2.x
lib_deps =
    lvgl/lvgl@9.2.2
    rzeldent/esp32_smartdisplay@2.1.1
    bblanchon/ArduinoJson@^7.4.2
build_flags =
    -Ofast
    -Wall
    '-D BOARD_NAME="${this.board}"'
    '-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO'
    ; unquoted on purpose: LVGL 9.2.x stringifies LV_CONF_PATH itself
    '-D LV_CONF_PATH=${platformio.include_dir}/lv_conf.h'
board_build.partitions = min_spiffs.csv
monitor_speed = 115200

; Original CYD: micro-USB, ILI9341
[env:esp32-2432S028R]
board = esp32-2432S028R

; USB-C variant: different screen init sequence
[env:esp32-2432S028Rv2]
board = esp32-2432S028Rv2

; Dual-USB clone: ST7789 panel
[env:esp32-2432S028Rv3]
board = esp32-2432S028Rv3
